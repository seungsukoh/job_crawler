name: Bootstrap database

on:
  workflow_dispatch:
    inputs:
      seed_sample:
        description: "Seed synthetic sample jobs after migrations"
        required: true
        type: boolean
        default: true

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API package
        run: python -m pip install --upgrade pip && python -m pip install -e apps/api

      - name: Verify database secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is required."
            exit 1
          fi

      - name: Run migrations
        run: python -m app.db.migrate

      - name: Seed sample jobs
        if: ${{ inputs.seed_sample }}
        run: python -m app.db.seed --clear-sample
