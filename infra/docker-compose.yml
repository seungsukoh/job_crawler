name: job_crawler_local

services:
  postgres:
    image: postgres:16-alpine
    container_name: job_crawler_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-job_crawler}
      POSTGRES_USER: ${POSTGRES_USER:-job_crawler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-job_crawler}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
